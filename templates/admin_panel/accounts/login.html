{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr" data-startbar="light" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <title>Panel Login | Hostel Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="{% static 'mifty/images/favicon.ico' %}">
    <link href="{% static 'mifty/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'mifty/css/icons.min.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'mifty/css/app.min.css' %}" rel="stylesheet" type="text/css">
</head>
<body>
    <div class="container-xxl">
        <div class="row vh-100 d-flex justify-content-center">
            <div class="col-12 align-self-center">
                <div class="row">
                    <div class="col-lg-4 mx-auto">
                        <div class="card">
                            <div class="card-body p-0 bg-black auth-header-box rounded-top">
                                <div class="text-center p-3">
                                    <img src="{% static 'mifty/images/logo-sm.png' %}" height="50" alt="logo" class="auth-logo">
                                    <h4 class="mt-3 mb-1 fw-semibold text-white fs-18">Hostel Management Panel</h4>
                                    <p class="text-muted fw-medium mb-0">Sign in to continue.</p>
                                </div>
                            </div>
                            <div class="card-body pt-0">
                                <form method="post" class="my-4">
                                    {% csrf_token %}
                                    {% if form.non_field_errors %}
                                        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                                    {% endif %}
                                    {% for field in form %}
                                        <div class="form-group mb-3">
                                            <label class="form-label">{{ field.label }}</label>
                                            {{ field }}
                                            {% for error in field.errors %}
                                                <div class="text-danger small">{{ error }}</div>
                                            {% endfor %}
                                        </div>
                                    {% endfor %}
                                    <div class="d-grid mt-3">
                                        <button class="btn btn-primary" type="submit">Log In</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
