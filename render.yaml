services:
  - type: pserv
    name: hostel-management-db
    plan: free
    ipAllowList: []
  - type: web
    name: hostel-management
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py ensure_panel_admin && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi --log-file -
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hostel-management-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: SERVE_MEDIA_FILES
        value: true
      - key: PANEL_ADMIN_EMAIL
        value: admin@example.com
      - key: PANEL_ADMIN_USERNAME
        value: admin@example.com
      - key: PANEL_ADMIN_PASSWORD
        sync: false
      - key: PANEL_ADMIN_NAME
        value: Hostel Admin
